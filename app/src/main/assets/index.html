<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TechMemo · 智能备忘录</title>
<style>
  /* ===== 全局重置 ===== */
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  :root {
    --bg-primary: #050d1a;
    --bg-card: #0a1628;
    --bg-card2: #0d1f35;
    --accent-cyan: #00d4ff;
    --accent-blue: #0080ff;
    --accent-purple: #8a2be2;
    --accent-green: #00ff88;
    --accent-yellow: #ffcc00;
    --accent-red: #ff4466;
    --text-primary: #e0f0ff;
    --text-secondary: #7090b0;
    --border: rgba(0,212,255,0.15);
    --glow-cyan: 0 0 20px rgba(0,212,255,0.4);
    --glow-blue: 0 0 20px rgba(0,128,255,0.4);
  }

  html, body {
    height: 100%;
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    overflow: hidden;
  }

  /* ===== 背景粒子 ===== */
  #particles-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  /* ===== 扫描线效果 ===== */
  .scanline {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,212,255,0.01) 2px,
      rgba(0,212,255,0.01) 4px
    );
    pointer-events: none;
    z-index: 1;
  }

  /* ===== 应用容器 ===== */
  #app {
    position: relative;
    z-index: 10;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ===== 顶部标题栏 ===== */
  .header {
    padding: 16px 20px 12px;
    background: linear-gradient(180deg, rgba(0,15,35,0.95) 0%, transparent 100%);
    border-bottom: 1px solid var(--border);
    position: relative;
    flex-shrink: 0;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }
  .app-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    background: linear-gradient(90deg, var(--accent-cyan), var(--accent-blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .title-icon {
    width: 36px;
    height: 36px;
    border: 2px solid var(--accent-cyan);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--glow-cyan);
    cursor: pointer;
    transition: all 0.3s;
    font-size: 18px;
    background: rgba(0,212,255,0.1);
  }
  .title-icon:active { transform: scale(0.9); }
  .header-subtitle {
    font-size: 11px;
    color: var(--text-secondary);
    letter-spacing: 2px;
  }
  #current-time {
    font-size: 11px;
    color: var(--accent-cyan);
    font-family: 'Courier New', monospace;
    letter-spacing: 1px;
  }

  /* ===== 统计面板 ===== */
  .stats-panel {
    margin: 12px 16px 0;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }
  .stats-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent-cyan), var(--accent-blue), var(--accent-purple));
  }
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 12px;
  }
  .stat-item {
    text-align: center;
  }
  .stat-value {
    font-size: 24px;
    font-weight: 700;
    font-family: 'Courier New', monospace;
    line-height: 1;
  }
  .stat-label {
    font-size: 10px;
    color: var(--text-secondary);
    margin-top: 3px;
    letter-spacing: 1px;
  }
  .stat-total .stat-value { color: var(--accent-cyan); }
  .stat-pending .stat-value { color: var(--text-secondary); }
  .stat-doing .stat-value { color: var(--accent-yellow); }
  .stat-done .stat-value { color: var(--accent-green); }

  /* 进度条 */
  .progress-section {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .progress-bar-wrap {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.06);
    border-radius: 3px;
    overflow: hidden;
    position: relative;
  }
  .progress-bar-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--accent-cyan), var(--accent-green));
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 0 8px rgba(0,255,136,0.6);
    position: relative;
  }
  .progress-bar-fill::after {
    content: '';
    position: absolute;
    right: 0; top: 0;
    width: 4px; height: 100%;
    background: white;
    border-radius: 2px;
    opacity: 0.8;
  }
  .progress-pct {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent-green);
    font-family: 'Courier New', monospace;
    min-width: 36px;
    text-align: right;
  }
  .progress-label {
    font-size: 10px;
    color: var(--text-secondary);
    letter-spacing: 1px;
  }

  /* ===== 标签筛选 ===== */
  .filter-tabs {
    display: flex;
    gap: 6px;
    padding: 10px 16px 0;
    overflow-x: auto;
    flex-shrink: 0;
    scrollbar-width: none;
  }
  .filter-tabs::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex-shrink: 0;
    padding: 5px 14px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: transparent;
    color: var(--text-secondary);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.25s;
    letter-spacing: 0.5px;
    font-family: inherit;
  }
  .tab-btn.active {
    background: rgba(0,212,255,0.15);
    border-color: var(--accent-cyan);
    color: var(--accent-cyan);
    box-shadow: 0 0 10px rgba(0,212,255,0.2);
  }
  .tab-btn:active { transform: scale(0.95); }

  /* ===== 任务列表 ===== */
  .list-container {
    flex: 1;
    overflow-y: auto;
    padding: 10px 16px 110px;
    scrollbar-width: thin;
    scrollbar-color: rgba(0,212,255,0.2) transparent;
  }
  .list-container::-webkit-scrollbar { width: 3px; }
  .list-container::-webkit-scrollbar-thumb { background: rgba(0,212,255,0.2); border-radius: 2px; }

  /* 空状态 */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 200px;
    color: var(--text-secondary);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
  .empty-text { font-size: 13px; letter-spacing: 2px; }

  /* 任务卡片 */
  .task-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
    position: relative;
    overflow: hidden;
    transition: all 0.3s;
    animation: cardIn 0.35s ease;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .task-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 3px 0 0 3px;
    transition: background 0.3s;
  }
  .task-card.status-pending::before { background: var(--text-secondary); }
  .task-card.status-doing::before { background: var(--accent-yellow); box-shadow: 0 0 8px rgba(255,204,0,0.5); }
  .task-card.status-done::before { background: var(--accent-green); box-shadow: 0 0 8px rgba(0,255,136,0.5); }

  .task-card:active { transform: scale(0.98); }

  .task-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 8px;
  }
  .task-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.4;
    flex: 1;
  }
  .task-title.done-text {
    color: var(--text-secondary);
    text-decoration: line-through;
  }
  .task-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }
  .action-btn {
    width: 28px; height: 28px;
    border: none;
    border-radius: 7px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: all 0.2s;
    background: rgba(255,255,255,0.06);
    color: var(--text-secondary);
  }
  .action-btn:active { transform: scale(0.85); }
  .btn-edit:hover { background: rgba(0,128,255,0.2); color: var(--accent-blue); }
  .btn-delete:hover { background: rgba(255,68,102,0.2); color: var(--accent-red); }

  .task-body {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 10px;
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* 时间信息行 */
  .task-times {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 8px;
  }
  .time-tag {
    font-size: 10px;
    font-family: 'Courier New', monospace;
    padding: 2px 8px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .time-tag.start-time {
    background: rgba(0,128,255,0.12);
    color: #5bb3ff;
    border: 1px solid rgba(0,128,255,0.25);
  }
  .time-tag.end-time {
    background: rgba(0,255,136,0.10);
    color: var(--accent-green);
    border: 1px solid rgba(0,255,136,0.25);
  }

  .task-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .task-date {
    font-size: 10px;
    color: var(--text-secondary);
    font-family: 'Courier New', monospace;
    opacity: 0.7;
  }
  .task-priority {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    letter-spacing: 0.5px;
    font-weight: 600;
  }
  .priority-high { background: rgba(255,68,102,0.15); color: var(--accent-red); border: 1px solid rgba(255,68,102,0.3); }
  .priority-mid { background: rgba(255,204,0,0.12); color: var(--accent-yellow); border: 1px solid rgba(255,204,0,0.3); }
  .priority-low { background: rgba(0,212,255,0.1); color: var(--text-secondary); border: 1px solid var(--border); }

  /* 状态选择器 */
  .status-selector {
    display: flex;
    gap: 4px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid rgba(255,255,255,0.05);
  }
  .status-btn {
    flex: 1;
    padding: 5px 4px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: transparent;
    color: var(--text-secondary);
    font-size: 10px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    font-family: inherit;
    letter-spacing: 0.5px;
  }
  .status-btn:active { transform: scale(0.95); }
  .status-btn.active-pending { 
    background: rgba(112,144,176,0.15); 
    border-color: var(--text-secondary); 
    color: var(--text-primary); 
  }
  .status-btn.active-doing { 
    background: rgba(255,204,0,0.15); 
    border-color: var(--accent-yellow); 
    color: var(--accent-yellow); 
    box-shadow: 0 0 8px rgba(255,204,0,0.2);
  }
  .status-btn.active-done { 
    background: rgba(0,255,136,0.12); 
    border-color: var(--accent-green); 
    color: var(--accent-green); 
    box-shadow: 0 0 8px rgba(0,255,136,0.2);
  }

  /* ===== 添加按钮 + 导出按钮区域 ===== */
  .bottom-actions {
    position: fixed;
    bottom: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 12px;
    z-index: 100;
  }

  .fab {
    width: 56px; height: 56px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
    color: white;
    font-size: 26px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,212,255,0.5), 0 0 40px rgba(0,128,255,0.3);
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .fab:active { transform: scale(0.9); }
  .fab::before {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    border: 1px solid rgba(0,212,255,0.3);
    animation: fabPulse 2s ease-in-out infinite;
  }
  @keyframes fabPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0; transform: scale(1.3); }
  }

  /* 导出按钮 */
  .export-btn {
    height: 40px;
    padding: 0 16px;
    border-radius: 20px;
    border: 1px solid rgba(0,255,136,0.4);
    background: rgba(0,255,136,0.1);
    color: var(--accent-green);
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    letter-spacing: 0.5px;
    transition: all 0.25s;
    box-shadow: 0 0 12px rgba(0,255,136,0.15);
  }
  .export-btn:active { transform: scale(0.95); opacity: 0.85; }

  /* 导入按钮 */
  .import-btn {
    height: 40px;
    padding: 0 16px;
    border-radius: 20px;
    border: 1px solid rgba(0,128,255,0.4);
    background: rgba(0,128,255,0.1);
    color: var(--accent-blue);
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    letter-spacing: 0.5px;
    transition: all 0.25s;
    box-shadow: 0 0 12px rgba(0,128,255,0.15);
  }
  .import-btn:active { transform: scale(0.95); opacity: 0.85; }

  /* 版本更新弹窗 */
  .update-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s;
    backdrop-filter: blur(6px);
  }
  .update-overlay.show { opacity: 1; visibility: visible; }
  .update-box {
    background: var(--bg-card2);
    border: 1px solid rgba(0,212,255,0.3);
    border-radius: 20px;
    padding: 28px 24px;
    width: 300px;
    text-align: center;
    position: relative;
    overflow: hidden;
    transform: scale(0.85) translateY(20px);
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 0 40px rgba(0,212,255,0.2);
  }
  .update-overlay.show .update-box { transform: scale(1) translateY(0); }
  .update-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent-cyan), var(--accent-blue), var(--accent-purple));
  }
  .update-icon { font-size: 44px; margin-bottom: 12px; }
  .update-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent-cyan);
    margin-bottom: 6px;
    letter-spacing: 2px;
  }
  .update-version {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 14px;
    font-family: 'Courier New', monospace;
  }
  .update-notes {
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 18px;
    text-align: left;
    max-height: 120px;
    overflow-y: auto;
  }
  .update-notes p {
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.8;
    margin: 0;
  }
  .update-btns { display: flex; gap: 10px; }
  .btn-update-later {
    flex: 1; padding: 11px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-secondary);
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .btn-update-now {
    flex: 2; padding: 11px;
    background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .btn-update-later:active, .btn-update-now:active { transform: scale(0.96); }

  /* 导入预览弹窗 */
  .import-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 400;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s;
    backdrop-filter: blur(4px);
  }
  .import-overlay.show { opacity: 1; visibility: visible; }
  .import-modal {
    width: 100%;
    max-width: 480px;
    background: var(--bg-card2);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 24px 24px 0 0;
    padding: 20px 20px 40px;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
    max-height: 80vh;
    overflow-y: auto;
    position: relative;
  }
  .import-modal::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan));
  }
  .import-overlay.show .import-modal { transform: translateY(0); }
  .import-preview-list {
    margin: 12px 0;
    max-height: 200px;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: rgba(0,0,0,0.2);
  }
  .import-preview-item {
    padding: 8px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 12px;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .import-preview-item:last-child { border-bottom: none; }
  .import-preview-item .item-title { color: var(--text-primary); font-weight: 500; flex: 1; }
  .import-preview-item .item-priority {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 8px;
  }
  .import-hint {
    font-size: 11px;
    color: var(--text-secondary);
    margin: 10px 0;
    line-height: 1.6;
    padding: 10px;
    background: rgba(0,128,255,0.06);
    border: 1px solid rgba(0,128,255,0.15);
    border-radius: 8px;
  }

  /* ===== 弹窗 ===== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.show {
    opacity: 1;
    visibility: visible;
  }
  .modal {
    width: 100%;
    max-width: 480px;
    background: var(--bg-card2);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 24px 24px 0 0;
    padding: 20px 20px 40px;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
    position: relative;
    overflow: hidden;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent-cyan), var(--accent-blue), var(--accent-purple));
  }
  .modal-overlay.show .modal {
    transform: translateY(0);
  }
  .modal-handle {
    width: 40px; height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    margin: 0 auto 20px;
  }
  .modal-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent-cyan);
    margin-bottom: 18px;
    letter-spacing: 2px;
  }

  .form-group { margin-bottom: 14px; }
  .form-label {
    font-size: 11px;
    color: var(--text-secondary);
    margin-bottom: 6px;
    display: block;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .form-input, .form-textarea, .form-select {
    width: 100%;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text-primary);
    font-size: 14px;
    font-family: inherit;
    outline: none;

<script>
// ===== 粒子背景 =====
(function() {
  const canvas = document.getElementById('particles-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [], lines = [];

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function rand(min, max) { return Math.random() * (max - min) + min; }

  // 创建粒子
  for (let i = 0; i < 60; i++) {
    particles.push({
      x: rand(0, W), y: rand(0, H),
      vx: rand(-0.3, 0.3), vy: rand(-0.3, 0.3),
      r: rand(0.5, 2),
      alpha: rand(0.3, 0.8)
    });
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    
    // 连线
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 120) {
          ctx.beginPath();
          ctx.strokeStyle = `rgba(0,212,255,${(1 - dist/120) * 0.15})`;
          ctx.lineWidth = 0.5;
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.stroke();
        }
      }
    }

    // 粒子
    particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(0,212,255,${p.alpha})`;
      ctx.fill();
      
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0 || p.x > W) p.vx *= -1;
      if (p.y < 0 || p.y > H) p.vy *= -1;
    });

    requestAnimationFrame(draw);
  }
  draw();
})();

// ===== 时钟 =====
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('current-time').textContent = `${h}:${m}:${s}`;
}
setInterval(updateClock, 1000);
updateClock();

// ===== 辅助：获取当前 datetime-local 格式字符串 =====
function nowDatetimeLocal() {
  const now = new Date();
  const yyyy = now.getFullYear();
  const MM = String(now.getMonth()+1).padStart(2,'0');
  const dd = String(now.getDate()).padStart(2,'0');
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  return `${yyyy}-${MM}-${dd}T${hh}:${mm}`;
}

// ===== 辅助：格式化 datetime-local 显示 =====
function fmtDatetime(dtStr) {
  if (!dtStr) return '';
  // dtStr: "2026-04-06T19:00"
  return dtStr.replace('T', ' ').substring(0, 16);
}

// ===== 数据层 =====
const STORAGE_KEY = 'techmemo_tasks_v3';
const APP_VERSION = '4.0.0';
const GITHUB_RELEASES_API = 'https://api.github.com/repos/ruobingever/techmemo-app/releases/latest';

let tasks = [];
let currentFilter = 'all';
let editingId = null;
let deletingId = null;
let sortMode = 'newest'; // newest | priority | status
let pendingImportTasks = []; // 待导入的任务列表
let updateDownloadUrl = '';

function loadTasks() {
  try {
    // 尝试读取新版数据
    let saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) {
      // 兼容旧版数据
      saved = localStorage.getItem('techmemo_tasks_v2');
    }
    if (saved) tasks = JSON.parse(saved);
    // 迁移旧数据：补充新字段
    tasks = tasks.map(t => ({
      startTime: '',
      endTime: '',
      ...t
    }));
    // 默认演示数据
    if (!tasks || tasks.length === 0) {
      tasks = [
        { id: Date.now()-3000, title: '完成产品需求文档', desc: '整理Q2核心功能的PRD，需要与PM对齐', status: 'done', priority: 'high', date: '2026-04-01 09:00', startTime: '2026-04-01T09:00', endTime: '2026-04-01T17:30' },
        { id: Date.now()-2000, title: '前端性能优化专项', desc: '针对首屏加载时间进行优化，目标 < 1.5s', status: 'doing', priority: 'high', date: '2026-04-03 14:30', startTime: '2026-04-03T14:30', endTime: '' },
        { id: Date.now()-1000, title: 'API接口联调测试', desc: '与后端确认接口字段，完成所有功能模块联调', status: 'doing', priority: 'mid', date: '2026-04-04 10:00', startTime: '2026-04-04T10:00', endTime: '' },
        { id: Date.now()-500, title: '周会PPT制作', desc: '准备本周项目进展汇报材料', status: 'pending', priority: 'mid', date: '2026-04-04 12:00', startTime: '', endTime: '' },
        { id: Date.now()-100, title: '代码评审', desc: '审查新功能分支代码，提交review意见', status: 'pending', priority: 'low', date: '2026-04-04 12:27', startTime: '', endTime: '' }
      ];
      saveTasks();
    }
  } catch(e) { tasks = []; }
}

function saveTasks() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
}

function getFilteredTasks() {
  const query = (document.getElementById('search-input')?.value || '').toLowerCase();
  return tasks.filter(t => {
    const matchSearch = !query || t.title.toLowerCase().includes(query) || (t.desc||'').toLowerCase().includes(query);
    let matchFilter = true;
    if (currentFilter === 'all') matchFilter = true;
    else if (currentFilter === 'pending') matchFilter = t.status === 'pending';
    else if (currentFilter === 'doing') matchFilter = t.status === 'doing';
    else if (currentFilter === 'done') matchFilter = t.status === 'done';
    else if (currentFilter === 'high') matchFilter = t.priority === 'high';
    else if (currentFilter === 'mid') matchFilter = t.priority === 'mid';
    else if (currentFilter === 'low') matchFilter = t.priority === 'low';
    return matchSearch && matchFilter;
  }).sort((a, b) => {
    if (sortMode === 'newest') return b.id - a.id;
    if (sortMode === 'priority') {
      const p = { high: 0, mid: 1, low: 2 };
      return p[a.priority] - p[b.priority];
    }
    if (sortMode === 'status') {
      const s = { doing: 0, pending: 1, done: 2 };
      return s[a.status] - s[b.status];
    }
    return 0;
  });
}

// ===== 统计更新 =====
function updateStats() {
  const total = tasks.length;
  const pending = tasks.filter(t => t.status === 'pending').length;
  const doing = tasks.filter(t => t.status === 'doing').length;
  const done = tasks.filter(t => t.status === 'done').length;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-pending').textContent = pending;
  document.getElementById('stat-doing').textContent = doing;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-pct').textContent = pct + '%';

  // 标签计数
  document.getElementById('cnt-all').textContent = total;
  document.getElementById('cnt-pending').textContent = pending;
  document.getElementById('cnt-doing').textContent = doing;
  document.getElementById('cnt-done').textContent = done;
}

// ===== 渲染任务 =====
function renderTasks() {
  updateStats();
  const container = document.getElementById('task-list');
  const filtered = getFilteredTasks();
  const empty = document.getElementById('empty-state');

  // 移除旧卡片
  Array.from(container.querySelectorAll('.task-card')).forEach(el => el.remove());

  if (filtered.length === 0) {
    empty.style.display = 'flex';
    return;
  }
  empty.style.display = 'none';

  filtered.forEach(task => {
    const card = document.createElement('div');
    card.className = `task-card status-${task.status}`;
    card.dataset.id = task.id;

    const priorityLabel = { high: '高优先级', mid: '中优先级', low: '低优先级' }[task.priority];
    const priorityClass = `priority-${task.priority}`;
    const statusBtns = [
      { key: 'pending', label: '⬜ 未开始' },
      { key: 'doing', label: '🔄 进行中' },
      { key: 'done', label: '✅ 已完成' }
    ].map(s => `<button class="status-btn ${s.key === task.status ? 'active-' + s.key : ''}" onclick="changeStatus(${task.id},'${s.key}',event)">${s.label}</button>`).join('');

    // 时间标签
    let timeTags = '';
    if (task.startTime) {
      timeTags += `<span class="time-tag start-time">🚀 ${fmtDatetime(task.startTime)}</span>`;
    }
    if (task.endTime) {
      timeTags += `<span class="time-tag end-time">✅ ${fmtDatetime(task.endTime)}</span>`;
    }

    card.innerHTML = `
      <div class="task-header">
        <div class="task-title ${task.status === 'done' ? 'done-text' : ''}">${escHtml(task.title)}</div>
        <div class="task-actions">
          <button class="action-btn btn-edit" onclick="openEditModal(${task.id},event)" title="编辑">✏️</button>
          <button class="action-btn btn-delete" onclick="askDelete(${task.id},event)" title="删除">🗑️</button>
        </div>
      </div>
      ${task.desc ? `<div class="task-body">${escHtml(task.desc)}</div>` : ''}
      ${timeTags ? `<div class="task-times">${timeTags}</div>` : ''}
      <div class="task-footer">
        <span class="task-date">${task.date}</span>
        <span class="task-priority ${priorityClass}">${priorityLabel}</span>
      </div>
      <div class="status-selector">${statusBtns}</div>
    `;
    container.appendChild(card);
  });
}

function escHtml(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== 筛选 =====
function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTasks();
}

// ===== 状态切换（自动填充时间）=====
function changeStatus(id, newStatus, event) {
  event && event.stopPropagation();
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  const oldStatus = task.status;
  task.status = newStatus;

  // 自动填充时间
  const now = nowDatetimeLocal();
  if (newStatus === 'doing' && !task.startTime) {
    task.startTime = now;
  }
  if (newStatus === 'done') {
    if (!task.startTime) task.startTime = now;
    task.endTime = now;
  }
  // 撤回到未开始时清除时间（可选逻辑）
  // if (newStatus === 'pending') { task.startTime = ''; task.endTime = ''; }

  saveTasks();
  renderTasks();
  const labels = { pending: '已设为未开始', doing: '已设为进行中 🚀', done: '已标记完成 🎉' };
  showToast(labels[newStatus]);
}

// ===== 状态下拉联动填充时间 =====
function onStatusSelectChange() {
  const status = document.getElementById('input-status').value;
  const now = nowDatetimeLocal();
  const startInput = document.getElementById('input-start-time');
  const endInput = document.getElementById('input-end-time');

  if (status === 'doing' && !startInput.value) {
    startInput.value = now;
  }
  if (status === 'done') {
    if (!startInput.value) startInput.value = now;
    if (!endInput.value) endInput.value = now;
  }
}

// ===== 弹窗 =====
function openModal() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'NEW TASK';
  document.getElementById('input-title').value = '';
  document.getElementById('input-desc').value = '';
  document.getElementById('input-priority').value = 'mid';
  document.getElementById('input-status').value = 'pending';
  document.getElementById('input-start-time').value = '';
  document.getElementById('input-end-time').value = '';
  document.getElementById('modal-overlay').classList.add('show');
  setTimeout(() => document.getElementById('input-title').focus(), 400);
}

function openEditModal(id, event) {
  event && event.stopPropagation();
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  editingId = id;
  document.getElementById('modal-title').textContent = 'EDIT TASK';
  document.getElementById('input-title').value = task.title;
  document.getElementById('input-desc').value = task.desc || '';
  document.getElementById('input-priority').value = task.priority;
  document.getElementById('input-status').value = task.status;
  document.getElementById('input-start-time').value = task.startTime || '';
  document.getElementById('input-end-time').value = task.endTime || '';
  document.getElementById('modal-overlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}

function closeModalOutside(event) {
  if (event.target === document.getElementById('modal-overlay')) closeModal();
}

function saveTask() {
  const title = document.getElementById('input-title').value.trim();
  if (!title) { showToast('请输入任务标题'); return; }

  const now = new Date();
  const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  const newStatus = document.getElementById('input-status').value;
  let startTime = document.getElementById('input-start-time').value;
  let endTime = document.getElementById('input-end-time').value;

  // 保存时自动填充时间逻辑
  const nowStr = nowDatetimeLocal();
  if (newStatus === 'doing' && !startTime) startTime = nowStr;
  if (newStatus === 'done') {
    if (!startTime) startTime = nowStr;
    if (!endTime) endTime = nowStr;
  }

  if (editingId) {
    const task = tasks.find(t => t.id === editingId);
    if (task) {
      task.title = title;
      task.desc = document.getElementById('input-desc').value.trim();
      task.priority = document.getElementById('input-priority').value;
      task.status = newStatus;
      task.startTime = startTime;
      task.endTime = endTime;
    }
    showToast('任务已更新');
  } else {
    tasks.unshift({
      id: Date.now(),
      title,
      desc: document.getElementById('input-desc').value.trim(),
      priority: document.getElementById('input-priority').value,
      status: newStatus,
      date: dateStr,
      startTime,
      endTime
    });
    showToast('任务已添加 ✨');
  }
  saveTasks();
  closeModal();
  renderTasks();
}

// ===== 删除 =====
function askDelete(id, event) {
  event && event.stopPropagation();
  deletingId = id;
  document.getElementById('confirm-overlay').classList.add('show');
}

function closeConfirm() {
  document.getElementById('confirm-overlay').classList.remove('show');
  deletingId = null;
}

function confirmDelete() {
  if (deletingId === null) return;
  tasks = tasks.filter(t => t.id !== deletingId);
  saveTasks();
  closeConfirm();
  renderTasks();
  showToast('任务已删除');
}

// ===== 排序 =====
function toggleSortMenu() {
  const modes = ['newest', 'priority', 'status'];
  const labels = ['最新优先', '优先级排序', '状态排序'];
  const idx = modes.indexOf(sortMode);
  sortMode = modes[(idx + 1) % 3];
  showToast('排序: ' + labels[(idx + 1) % 3]);
  renderTasks();
}

// ===== 版本更新检测 =====
function checkUpdate() {
  // 如果有Android接口则通过原生网络请求
  try {
    if (window.AndroidBridge && typeof window.AndroidBridge.checkUpdate === 'function') {
      // 注册回调（Android会调用此函数返回结果）
      window._updateCallback = function(latestVersion, releaseNotes, downloadUrl) {
        handleUpdateResult(latestVersion, releaseNotes, downloadUrl);
      };
      window.AndroidBridge.checkUpdate(GITHUB_RELEASES_API);
      return;
    }
  } catch(e) {}

  // 降级：直接用 fetch（需要网络权限）
  fetch(GITHUB_RELEASES_API)
    .then(r => r.json())
    .then(data => {
      const latestVersion = (data.tag_name || '').replace(/^v/, '');
      const releaseNotes = data.body || '暂无更新说明';
      const downloadUrl = (data.assets && data.assets[0]) ? data.assets[0].browser_download_url : '';
      handleUpdateResult(latestVersion, releaseNotes, downloadUrl);
    })
    .catch(() => {
      // 网络不通，静默失败
    });
}

function handleUpdateResult(latestVersion, releaseNotes, downloadUrl) {
  if (!latestVersion) return;
  // 版本比较（简单字符串比较，适用于 x.y.z 格式）
  if (latestVersion === APP_VERSION) return; // 已是最新
  const current = APP_VERSION.split('.').map(Number);
  const latest = latestVersion.split('.').map(Number);
  let isNewer = false;
  for (let i = 0; i < 3; i++) {
    const c = current[i] || 0;
    const l = latest[i] || 0;
    if (l > c) { isNewer = true; break; }
    if (l < c) break;
  }
  if (!isNewer) return;

  updateDownloadUrl = downloadUrl;
  document.getElementById('update-version-text').textContent = `v${APP_VERSION} → v${latestVersion}`;
  document.getElementById('update-notes-text').innerHTML = releaseNotes
    .split('\n')
    .filter(l => l.trim())
    .map(l => `• ${l.trim()}`)
    .join('<br>');
  document.getElementById('update-overlay').classList.add('show');
}

function closeUpdateModal() {
  document.getElementById('update-overlay').classList.remove('show');
}

function downloadUpdate() {
  if (updateDownloadUrl) {
    try {
      if (window.AndroidBridge && typeof window.AndroidBridge.openUrl === 'function') {
        window.AndroidBridge.openUrl(updateDownloadUrl);
      } else {
        window.open(updateDownloadUrl, '_blank');
      }
    } catch(e) {
      window.open(updateDownloadUrl, '_blank');
    }
  }
  closeUpdateModal();
}

// ===== CSV 导入 =====
function importFromCSV() {
  // 优先使用Android原生文件选择器
  try {
    if (window.AndroidBridge && typeof window.AndroidBridge.pickCSVFile === 'function') {
      window._importCallback = function(csvContent) {
        parseAndPreviewCSV(csvContent);
      };
      window.AndroidBridge.pickCSVFile();
      return;
    }
  } catch(e) {}

  // 降级：浏览器文件输入（仅支持 CSV，xlsx 需要 Android 原生）
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.csv,.txt,.xlsx';
  input.onchange = function(e) {
    const file = e.target.files[0];
    if (!file) return;
    if (file.name.toLowerCase().endsWith('.xlsx')) {
      showToast('xlsx格式需在APP内使用');
      return;
    }
    const reader = new FileReader();
    reader.onload = function(ev) {
      parseAndPreviewCSV(ev.target.result);
    };
    reader.readAsText(file, 'UTF-8');
  };
  input.click();
}

function parseAndPreviewCSV(csvContent) {
  if (!csvContent) { showToast('文件内容为空'); return; }

  // 去除BOM
  const content = csvContent.replace(/^\uFEFF/, '').trim();
  const lines = content.split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) { showToast('CSV格式不正确或无数据行'); return; }

  pendingImportTasks = [];

  // 跳过第一行表头，解析数据行
  for (let i = 1; i < lines.length; i++) {
    const cols = parseCSVLine(lines[i]);
    if (!cols || cols.length === 0 || !cols[0]) continue;

    // 支持我们自己导出的格式（序号,标题,描述,优先级,状态,创建时间,开始时间,完成时间）
    // 也支持简化格式（标题,描述,优先级,状态）
    let title, desc, priority, status, startTime, endTime;

    if (cols.length >= 8) {
      // 完整格式（从导出文件导入）
      title = cols[1] || '';
      desc = cols[2] || '';
      priority = normalizePriority(cols[3]);
      status = normalizeStatus(cols[4]);
      startTime = cols[6] ? cols[6].replace(' ', 'T').substring(0,16) : '';
      endTime = cols[7] ? cols[7].replace(' ', 'T').substring(0,16) : '';
    } else {
      // 简化格式
      title = cols[0] || '';
      desc = cols[1] || '';
      priority = normalizePriority(cols[2] || '');
      status = normalizeStatus(cols[3] || '');
      startTime = '';
      endTime = '';
    }

    if (!title.trim()) continue;

    pendingImportTasks.push({ title: title.trim(), desc: desc.trim(), priority, status, startTime, endTime });
  }

  if (pendingImportTasks.length === 0) {
    showToast('未解析到有效任务');
    return;
  }

  // 展示预览
  document.getElementById('import-count').textContent = pendingImportTasks.length;
  const listEl = document.getElementById('import-preview-list');
  listEl.innerHTML = '';
  pendingImportTasks.slice(0, 20).forEach((t, i) => {
    const priorityColors = { high: 'priority-high', mid: 'priority-mid', low: 'priority-low' };
    const priorityLabels = { high: '高优', mid: '中优', low: '低优' };
    const statusEmoji = { pending: '⬜', doing: '🔄', done: '✅' };
    const item = document.createElement('div');
    item.className = 'import-preview-item';
    item.innerHTML = `
      <span>${statusEmoji[t.status] || '⬜'}</span>
      <span class="item-title">${escHtml(t.title)}</span>
      <span class="task-priority item-priority ${priorityColors[t.priority]}">${priorityLabels[t.priority]}</span>
    `;
    listEl.appendChild(item);
  });
  if (pendingImportTasks.length > 20) {
    const more = document.createElement('div');
    more.className = 'import-preview-item';
    more.style.justifyContent = 'center';
    more.innerHTML = `<span style="color:var(--text-secondary);font-size:11px">...还有 ${pendingImportTasks.length - 20} 条</span>`;
    listEl.appendChild(more);
  }

  document.getElementById('import-preview-container').style.display = 'block';
  document.getElementById('btn-import-confirm').style.display = '';
  document.getElementById('import-overlay').classList.add('show');
}

function parseCSVLine(line) {
  const result = [];
  let cur = '';
  let inQuote = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      if (inQuote && line[i+1] === '"') { cur += '"'; i++; }
      else { inQuote = !inQuote; }
    } else if (ch === ',' && !inQuote) {
      result.push(cur);
      cur = '';
    } else {
      cur += ch;
    }
  }
  result.push(cur);
  return result;
}

function normalizePriority(str) {
  const s = (str || '').toLowerCase();
  if (s.includes('高') || s === 'high') return 'high';
  if (s.includes('低') || s === 'low') return 'low';
  return 'mid';
}

function normalizeStatus(str) {
  const s = (str || '').toLowerCase();
  if (s.includes('进行') || s === 'doing') return 'doing';
  if (s.includes('完成') || s === 'done') return 'done';
  return 'pending';
}

function closeImportModal() {
  document.getElementById('import-overlay').classList.remove('show');
  pendingImportTasks = [];
  document.getElementById('import-preview-container').style.display = 'none';
  document.getElementById('btn-import-confirm').style.display = 'none';
}

function closeImportOutside(event) {
  if (event.target === document.getElementById('import-overlay')) closeImportModal();
}

function confirmImport() {
  if (pendingImportTasks.length === 0) return;
  const now = new Date();
  const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  
  let imported = 0;
  pendingImportTasks.forEach(t => {
    // 检查是否重复（标题完全相同则跳过）
    if (tasks.some(existing => existing.title === t.title)) return;
    tasks.unshift({
      id: Date.now() + imported,
      title: t.title,
      desc: t.desc,
      priority: t.priority,
      status: t.status,
      date: dateStr,
      startTime: t.startTime || '',
      endTime: t.endTime || ''
    });
    imported++;
  });

  saveTasks();
  closeImportModal();
  renderTasks();
  showToast(`成功导入 ${imported} 条任务 📥`);
}

// ===== 导出 Excel (CSV) =====
function exportToExcel() {
  if (tasks.length === 0) {
    showToast('暂无任务数据');
    return;
  }

  // 构建 CSV 内容（带 BOM，Excel 能正确识别中文）
  const BOM = '\uFEFF';
  const headers = ['序号', '任务标题', '描述', '优先级', '状态', '创建时间', '开始时间', '完成时间'];
  
  const statusMap = { pending: '未开始', doing: '进行中', done: '已完成' };
  const priorityMap = { high: '高优先级', mid: '中优先级', low: '低优先级' };

  const rows = tasks.map((t, i) => [
    i + 1,
    t.title,
    t.desc || '',
    priorityMap[t.priority] || t.priority,
    statusMap[t.status] || t.status,
    t.date || '',
    fmtDatetime(t.startTime) || '',
    fmtDatetime(t.endTime) || ''
  ]);

  const csvContent = BOM + [headers, ...rows]
    .map(row => row.map(cell => {
      // 包含逗号、换行或引号的字段需要用双引号包裹
      const str = String(cell);
      if (str.includes(',') || str.includes('\n') || str.includes('"')) {
        return '"' + str.replace(/"/g, '""') + '"';
      }
      return str;
    }).join(','))
    .join('\n');

  // 尝试调用 Android 原生接口保存文件
  try {
    if (window.AndroidBridge && typeof window.AndroidBridge.saveCSV === 'function') {
      const result = window.AndroidBridge.saveCSV(csvContent, 'TechMemo_Export.csv');
      showToast(result || '导出成功 📊');
      return;
    }
  } catch(e) {}

  // 降级：在浏览器环境下通过 <a> 下载
  try {
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'TechMemo_Export.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('导出成功 📊');
  } catch(e) {
    showToast('导出失败，请重试');
  }
}

// ===== Toast =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ===== 键盘Enter提交 =====
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && document.getElementById('modal-overlay').classList.contains('show')) {
    if (document.activeElement.tagName !== 'TEXTAREA') saveTask();
  }
  if (e.key === 'Escape') {
    closeModal();
    closeConfirm();
  }
});

// ===== 初始化 =====
loadTasks();
renderTasks();
// 延迟3秒检测更新，避免影响启动体验
setTimeout(checkUpdate, 3000);
</script>
